# Local development overrides
# This file is automatically loaded by docker compose
# Run: docker compose up --build

services:
  redis:
    ports:
      - "6379:6379"

  api:
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    volumes:
      - ./app:/app/app:ro
    mem_limit: 2g
    memswap_limit: 2g
    command: taskiq worker app.workers.broker:broker app.workers.tasks
