# Nginx configuration for api.stellai.pro
# Place this file at: /etc/nginx/sites-available/api.stellai.pro

# HTTP - redirect to HTTPS
server {
    listen 80;
    server_name api.stellai.pro;
    
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name api.stellai.pro;

    # SSL certificates (adjust paths to match your existing setup)
    # Example paths - check your stellai.pro config for actual paths
    ssl_certificate /etc/letsencrypt/live/api.stellai.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.stellai.pro/privkey.pem;
    
    # SSL settings (copy from your existing stellai.pro config)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Proxy to mithril backend
    location / {
        proxy_pass http://127.0.0.1:18000;
        proxy_http_version 1.1;
        
        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        
        # WebSocket support (if needed)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Health check endpoint (optional - for monitoring)
    location /health {
        proxy_pass http://127.0.0.1:18000/health;
        access_log off;
    }
}
